name: CI

on:
  push:
    branches: ["**"]  # branch pushes only
  pull_request:

# Serialize main runs so two quick merges can't compute the same release version;
# every other ref gets a unique group (no contention).
concurrency:
  group: ${{ github.ref == 'refs/heads/main' && 'ci-main-release' || format('ci-{0}', github.run_id) }}
  cancel-in-progress: false

jobs:
  tox:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip setuptools wheel
          pip install tox

      - name: Run tox
        run: tox

  build:
    uses: ./.github/workflows/python-build.yml

  publish-dev:
    name: Publish dev version to TestPyPI
    if: github.event_name == 'push'  # && github.ref != 'refs/heads/main'
    needs: [tox, build]
    runs-on: ubuntu-latest
    environment:
      name: testpypi
      url: https://test.pypi.org/project/liron-utils
    permissions:
      id-token: write  # mandatory for trusted publishing
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/

      - uses: pypa/gh-action-pypi-publish@release/v1
        with:
          repository-url: https://test.pypi.org/legacy/

  release:
    name: Tag and publish release to PyPI
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    needs: [tox, build]
    runs-on: ubuntu-latest
    environment:
      name: pypi
      url: https://pypi.org/project/liron-utils
    permissions:
      id-token: write  # mandatory for trusted publishing
      contents: write  # push the release tag
    steps:
      - uses: actions/checkout@v4

      # Tag first: the tag is the version reservation. If the upload below fails,
      # the tag remains and the run can be retried without a same-day counter collision.
      - name: Create release tag
        run: |
          version="${{ needs.build.outputs.version }}"
          git tag "v${version}" "${GITHUB_SHA}"
          git push origin "v${version}"

      - uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/

      - uses: pypa/gh-action-pypi-publish@release/v1
