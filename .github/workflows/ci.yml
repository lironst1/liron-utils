name: CI

on:
  push:
    branches: ["**"]  # branch pushes only
  pull_request:

# Serialize main runs so two quick merges can't compute the same release version;
# every other ref gets a unique group (no contention).
concurrency:
  group: ${{ github.ref == 'refs/heads/main' && 'ci-main-release' || format('ci-{0}', github.run_id) }}
  cancel-in-progress: false

jobs:
  tox:
    name: tox (${{ matrix.env }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false  # a lint failure shouldn't hide the typing/tests verdicts
      matrix:
        env: [style, tests, lint, typing]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install tox
        run: |
          python -m pip install --upgrade pip
          pip install tox tox-uv

      # tox doesn't consume poetry.lock (deps resolve from pyproject metadata),
      # so pyproject.toml is the honest cache key; the env is rebuilt when it changes.
      - name: Cache tox environment
        uses: actions/cache@v4
        with:
          path: .tox/${{ matrix.env }}
          key: tox-${{ matrix.env }}-py3.11-${{ runner.os }}-${{ hashFiles('pyproject.toml') }}

      - name: Cache uv downloads
        uses: actions/cache@v4
        with:
          path: ~/.cache/uv
          key: uv-${{ runner.os }}-${{ hashFiles('pyproject.toml') }}
          restore-keys: uv-${{ runner.os }}-

      - name: Cache pre-commit hooks
        if: matrix.env == 'style'
        uses: actions/cache@v4
        with:
          path: ~/.cache/pre-commit
          key: pre-commit-${{ runner.os }}-${{ hashFiles('.pre-commit-config.yaml') }}

      # mypy's incremental cache has no stable key — always restore the most
      # recent one (restore-keys prefix match) and save a fresh copy per commit.
      - name: Cache mypy incremental cache
        if: matrix.env == 'typing'
        uses: actions/cache@v4
        with:
          path: .mypy_cache
          key: mypy-${{ runner.os }}-${{ github.sha }}
          restore-keys: mypy-${{ runner.os }}-

      - name: Run tox
        run: tox -e ${{ matrix.env }}

  build:
    uses: ./.github/workflows/python-build.yml

  publish-dev:
    name: Publish dev version to TestPyPI
    if: github.event_name == 'push'  # && github.ref != 'refs/heads/main'
    needs: [tox, build]
    runs-on: ubuntu-latest
    environment:
      name: testpypi
      url: https://test.pypi.org/project/liron-utils
    permissions:
      id-token: write  # mandatory for trusted publishing
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/

      - uses: pypa/gh-action-pypi-publish@release/v1
        with:
          repository-url: https://test.pypi.org/legacy/

  release:
    name: Tag and publish release to PyPI
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    needs: [tox, build]
    runs-on: ubuntu-latest
    environment:
      name: pypi
      url: https://pypi.org/project/liron-utils
    permissions:
      id-token: write  # mandatory for trusted publishing
      contents: write  # push the release tag
    steps:
      - uses: actions/checkout@v4

      # Tag first: the tag is the version reservation. If the upload below fails,
      # the tag remains and the run can be retried without a same-day counter collision.
      # Idempotent: a retry after a failed upload finds its own tag at this commit and
      # skips; a tag at a DIFFERENT commit means a version collision — fail loudly.
      - name: Create release tag
        run: |
          version="${{ needs.build.outputs.version }}"
          existing_sha=$(git ls-remote origin "refs/tags/v${version}" | cut -f1)
          if [[ -z "${existing_sha}" ]]; then
            git tag "v${version}" "${GITHUB_SHA}"
            git push origin "v${version}"
          elif [[ "${existing_sha}" == "${GITHUB_SHA}" ]]; then
            echo "Tag v${version} already exists at this commit (retry after failed upload) - skipping."
          else
            echo "Tag v${version} exists at ${existing_sha}, not ${GITHUB_SHA} - version collision." >&2
            exit 1
          fi

      - uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/

      - uses: pypa/gh-action-pypi-publish@release/v1
